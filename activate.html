<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الحساب | Madinah Guide</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#f0faf6 0%,#e8f5f0 100%);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
      padding:20px;
    }
    .card{
      background:#fff;border-radius:20px;padding:44px 36px;max-width:420px;width:100%;
      box-shadow:0 8px 32px rgba(8,80,65,0.12);text-align:center;
    }
    .icon{font-size:56px;margin-bottom:16px;display:block}
    h1{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:10px}
    p{font-size:14px;color:#555;line-height:1.7;margin-bottom:6px}
    .sub{font-size:12px;color:#888;direction:ltr;margin-top:4px}
    .btn{
      display:inline-block;margin-top:24px;padding:13px 32px;
      background:linear-gradient(135deg,#085041,#1D9E75);
      color:#fff;border-radius:12px;font-size:14px;font-weight:700;
      text-decoration:none;transition:opacity .2s;
    }
    .btn:hover{opacity:.88}
    .btn-red{background:#A32D2D}
    .spinner{
      width:48px;height:48px;border:4px solid #e0f0eb;
      border-top:4px solid #1D9E75;border-radius:50%;
      animation:spin 0.9s linear infinite;margin:0 auto 20px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>جاري التحقق…</h1>
    <p>Verifying your email, please wait…</p>
  </div>

  <script>
    const BACKEND = 'https://madinah-guide-backend-1.onrender.com';
    const token   = new URLSearchParams(location.search).get('token');

    async function activate() {
      const card = document.getElementById('card');
      if (!token) return showError('no_token');

      try {
        const r = await fetch(BACKEND + '/auth/visitor/activate/' + token);
        const d = await r.json();

        if (!r.ok) return showError(d.error || 'unknown');

        // ✅ Email verified — ask user to sign in with their password
        card.innerHTML =
          '<span class="icon">✅</span>' +
          '<h1>تم التحقق من بريدك!</h1>' +
          '<p>أهلاً ' + (d.name || 'بك') + ' — تم تأكيد بريدك الإلكتروني بنجاح.</p>' +
          '<p class="sub">Your email is verified. Sign in with your password to start exploring Madinah!</p>' +
          '<a href="index.html#signin" class="btn">🔑 تسجيل الدخول | Sign In</a>';

      } catch (err) {
        showError('network');
      }
    }

    function showError(code) {
      const msgs = {
        invalid_token: { ar: 'الرابط غير صالح',           en: 'This link is invalid or does not exist.' },
        token_used:    { ar: 'تم استخدام هذا الرابط',      en: 'This link has already been used.' },
        token_expired: { ar: 'انتهت صلاحية الرابط',        en: 'This link has expired. Please register again.' },
        network:       { ar: 'خطأ في الشبكة',              en: 'Network error. Please try again.' },
        no_token:      { ar: 'رابط غير صحيح',              en: 'No token found in this link.' },
      };
      const m = msgs[code] || { ar: 'حدث خطأ غير متوقع', en: 'Something went wrong.' };
      document.getElementById('card').innerHTML =
        '<span class="icon">❌</span>' +
        '<h1>' + m.ar + '</h1>' +
        '<p class="sub">' + m.en + '</p>' +
        '<a href="index.html" class="btn btn-red">← العودة | Go Back</a>';
    }

    activate();
  </script>
</body>
</html>
