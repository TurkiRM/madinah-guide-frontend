<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الحساب | Madinah Guide</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#f0faf6 0%,#e8f5f0 100%);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
      padding:20px;
    }
    .card{
      background:#fff;border-radius:20px;padding:44px 36px;max-width:420px;width:100%;
      box-shadow:0 8px 32px rgba(8,80,65,0.12);text-align:center;
    }
    .icon{font-size:56px;margin-bottom:16px;display:block}
    h1{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
    p{font-size:14px;color:#555;line-height:1.7;margin-bottom:6px}
    .sub{font-size:12px;color:#888;direction:ltr}
    .btn{
      display:inline-block;margin-top:24px;padding:13px 32px;
      background:linear-gradient(135deg,#085041,#1D9E75);
      color:#fff;border-radius:12px;font-size:14px;font-weight:700;
      text-decoration:none;transition:opacity .2s;
    }
    .btn:hover{opacity:.88}
    .spinner{
      width:48px;height:48px;border:4px solid #e0f0eb;
      border-top:4px solid #1D9E75;border-radius:50%;
      animation:spin 0.9s linear infinite;margin:0 auto 20px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>جاري التحقق…</h1>
    <p>Verifying your link, please wait…</p>
  </div>

  <script>
    const BACKEND = 'https://madinah-guide-backend-1.onrender.com';
    const params  = new URLSearchParams(location.search);
    const token   = params.get('token');
    const type    = params.get('type') || 'activation';

    async function activate() {
      const card = document.getElementById('card');

      if (!token) {
        return showError('no_token');
      }

      try {
        const r = await fetch(`${BACKEND}/auth/visitor/activate/${token}`);
        const d = await r.json();

        if (!r.ok) {
          return showError(d.error || 'unknown');
        }

        // Save session to localStorage
        localStorage.setItem('mg_visitor', JSON.stringify(d.visitor));

        if (d.type === 'activation') {
          card.innerHTML = `
            <span class="icon">✅</span>
            <h1>تم تفعيل حسابك!</h1>
            <p>مرحباً ${d.visitor.name || 'بك'} — حسابك الآن مفعّل في دليل المدينة.</p>
            <p class="sub">Your account is now active. Welcome to Madinah Guide!</p>
            <a href="index.html" class="btn">🏠 ابدأ الاستكشاف | Explore Now</a>
          `;
        } else {
          card.innerHTML = `
            <span class="icon">🎉</span>
            <h1>تم تسجيل الدخول!</h1>
            <p>أهلاً ${d.visitor.name || 'بك'} — يمكنك الآن استخدام دليل المدينة.</p>
            <p class="sub">You're signed in! Redirecting…</p>
            <a href="index.html" class="btn">🏠 العودة للتطبيق | Go to App</a>
          `;
          // Auto-redirect after 2s
          setTimeout(() => { location.href = 'index.html'; }, 2000);
        }

      } catch (err) {
        showError('network');
      }
    }

    function showError(code) {
      const card = document.getElementById('card');
      const msgs = {
        invalid_token: { ar: 'الرابط غير صالح', en: 'This link is invalid or does not exist.' },
        token_used:    { ar: 'تم استخدام هذا الرابط من قبل', en: 'This link has already been used.' },
        token_expired: { ar: 'انتهت صلاحية الرابط', en: 'This link has expired. Please register again.' },
        not_activated: { ar: 'الحساب غير مفعّل', en: 'Account not activated. Please check your email.' },
        network:       { ar: 'خطأ في الشبكة', en: 'Network error. Please try again.' },
        no_token:      { ar: 'رابط غير صحيح', en: 'No activation token found in this link.' },
      };
      const m = msgs[code] || { ar: 'حدث خطأ غير متوقع', en: 'Something went wrong.' };
      card.innerHTML = `
        <span class="icon">❌</span>
        <h1>${m.ar}</h1>
        <p class="sub">${m.en}</p>
        <a href="index.html" class="btn" style="background:#A32D2D">← العودة | Go Back</a>
      `;
    }

    activate();
  </script>
</body>
</html>
